<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Monitor - Statistic</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="./dist/output.css">
    <link rel="icon" href="data:,">
</head>
<body class="font-sans text-white flex min-h-screen">
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-ev-sidebar flex flex-col z-50 shadow-2xl closed md:relative md:transform-none">
        <div class="h-20 flex items-center px-6 gap-3">
            <div class="w-10 h-10 bg-ev-accent rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-car-side text-ev-sidebar text-xl"></i>
            </div>
            <span class="font-bold text-[16px] tracking-wide text-gray-100">EV Monitor</span>
            <button id="close-menu" class="md:hidden ml-auto text-gray-400 hover:text-white">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
        </div>

        <nav class="flex-1 mt-4 space-y-1">
            <a href="index.html" class="flex items-center px-6 py-4 text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <i class="fa-solid fa-chart-pie mr-4"></i> Dashboard
            </a>
            <a href="statistic.html" class="flex items-center px-6 py-4 text-white bg-white/5 relative group">
                <div class="absolute left-0 top-0 bottom-0 w-1 bg-ev-accent"></div>
                <i class="fa-solid fa-chart-line mr-4 text-ev-accent"></i> Statistic
            </a>
            <div id="theme-toggle" class="flex items-center px-6 py-4 text-gray-400 hover:text-white hover:bg-white/5 transition-all cursor-pointer">
                <i id="theme-icon" class="fa-solid fa-moon mr-4"></i>
                <span id="theme-text">Dark mode</span>
            </div>
            <a href="#" class="flex items-center px-6 py-4 text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <i class="fa-solid fa-gear mr-4"></i> Settings
            </a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col relative min-w-0">
        <header class="h-20 bg-ev-sidebar flex items-center justify-between px-4 md:px-8 z-10 border-l border-white/5">
            <div class="flex items-center gap-4">
                <button id="open-menu" class="md:hidden text-white text-xl">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h1 class="text-lg md:text-2xl font-semibold truncate">Detailed Statistics</h1>
            </div>
            
            <div class="flex items-center gap-3 md:gap-6">
                <span class="hidden md:block text-gray-400 text-sm font-medium" id="clock"></span>
                <div class="w-8 h-8 md:w-9 md:h-9 rounded-full bg-ev-accent flex items-center justify-center cursor-pointer">
                    <i class="fa-solid fa-user text-ev-sidebar text-sm"></i>
                </div>
            </div>
        </header>

        <main id="main-bg" class="flex-1 p-4 md:p-8">
            <div class="max-w-6xl mx-auto space-y-6 relative z-10">
                <section class="bg-ev-card rounded-2xl p-6 md:p-8 shadow-lg border border-white/5 flex flex-col min-h-[400px]">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <div>
                            <h2 class="text-xl font-bold text-white mb-1">Power Consumption History</h2>
                            <p class="text-gray-400 text-xs uppercase tracking-wider font-semibold">Detailed view by hours</p>
                        </div>
                            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                                <div class="flex flex-wrap items-center gap-3">
                                    <button id="regenerate-chart" class="px-4 py-2.5 bg-white/5 hover:bg-white/10 text-gray-300 hover:text-ev-accent rounded-lg text-xs font-bold uppercase tracking-widest transition-all border border-transparent hover:border-ev-accent/30 flex items-center gap-2">
                                        <i class="fa-solid fa-arrows-rotate"></i> New Chart
                                    </button>
                                </div>
                            </div>
                    </div>

                    <div class="flex-1 flex min-h-[350px] relative group mt-4">
                        <div class="w-14 flex flex-col justify-between pb-8 text-xs font-bold text-gray-500 italic z-10">
                            <span>120 kW</span>
                            <span>90 kW</span>
                            <span>60 kW</span>
                            <span>30 kW</span>
                            <span>0 kW</span>
                        </div>
                        <div class="flex-1 relative ml-2 overflow-x-auto md:overflow-x-visible">
                            <div class="relative h-full md:w-full" id="chart-scroll-inner" style="min-width: 100%">
                                <div class="absolute inset-0 flex flex-col justify-between pb-8 opacity-10">
                                    <div class="border-t border-gray-400 w-full"></div>
                                    <div class="border-t border-gray-400 border-dashed w-full"></div>
                                    <div class="border-t border-gray-400 border-dashed w-full"></div>
                                    <div class="border-t border-gray-400 border-dashed w-full"></div>
                                    <div class="border-t border-gray-400 w-full"></div>
                                </div>
                                <svg class="absolute inset-0 w-full h-[calc(100%-32px)] overflow-visible" preserveAspectRatio="none" viewBox="0 0 100 100">
                                    <defs>
                                        <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                            <stop offset="0%" stop-color="#84cc16" stop-opacity="0.4" />
                                            <stop offset="100%" stop-color="#84cc16" stop-opacity="0" />
                                        </linearGradient>
                                    </defs>
                                    <path id="large-chart-area" class="transition-all duration-700" d="" fill="url(#chartGradient)" />
                                    <path id="large-chart-path" class="transition-all duration-700" d="" stroke="#84cc16" stroke-width="2.5" fill="none" vector-effect="non-scaling-stroke"/>
                                </svg>
                                <div id="large-chart-labels" class="absolute bottom-0 left-0 right-0 flex justify-between text-xs font-bold text-gray-500 italic pb-4">
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <section class="bg-ev-card rounded-2xl p-6 md:p-8 shadow-lg border border-white/5">
                    <div class="mb-6">
                        <h2 class="text-xl font-bold text-white mb-1">Battery Charge History</h2>
                        <p class="text-gray-400 text-xs uppercase tracking-wider font-semibold">Level by hours</p>
                    </div>
                    <div class="overflow-x-auto">
                        <div class="min-w-[600px] md:min-w-0 pb-4">
                            <canvas id="battery-chart"></canvas>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="./src/js/main.js" type="module"></script>
</body>
</html>
